
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GlobalEcom Batch Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
      :root {
        --font-heiti: "PingFang SC", "Source Han Sans SC", "Source Han Sans CN", "Noto Sans CJK SC", "Noto Sans SC", system-ui, -apple-system, sans-serif;
      }
      
      body, button, input, select, textarea {
        font-family: var(--font-heiti) !important;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      /* 增强版侧边栏滚动条 */
      .sidebar-scroll {
        overflow-y: auto !important;
        scrollbar-width: thin;
        scrollbar-color: #cbd5e1 #f8fafc;
        -webkit-overflow-scrolling: touch;
      }
      
      .sidebar-scroll::-webkit-scrollbar {
        width: 8px;
      }
      
      .sidebar-scroll::-webkit-scrollbar-track {
        background: #f8fafc;
      }
      
      .sidebar-scroll::-webkit-scrollbar-thumb {
        background-color: #cbd5e1;
        border-radius: 20px;
        border: 2px solid #f8fafc;
      }
      
      .sidebar-scroll::-webkit-scrollbar-thumb:hover {
        background-color: #94a3b8;
      }

      @keyframes scan {
        0% { top: -10%; }
        100% { top: 110%; }
      }
      .animate-scan {
        animation: scan 3s linear infinite;
      }
      .tech-grid {
        background-image: linear-gradient(rgba(15, 23, 42, 0.9) 1px, transparent 1px),
                          linear-gradient(90deg, rgba(15, 23, 42, 0.9) 1px, transparent 1px);
        background-size: 50px 50px;
      }
    </style>
<link rel="stylesheet" href="/index.css">
</head>
<body class="bg-gray-50 text-gray-900 h-screen overflow-hidden m-0 p-0">
    <div id="root" class="h-full w-full overflow-hidden"></div>
    <script type="module" src="/index.tsx"></script>
</body>
</html>
