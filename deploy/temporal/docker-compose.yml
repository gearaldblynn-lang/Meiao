name: meiao-temporal

services:
  postgresql:
    image: postgres:16
    container_name: meiao-temporal-postgresql
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: temporal
      POSTGRES_USER: temporal
      PGDATA: /var/lib/postgresql/data/pgdata
    networks:
      - temporal-network
    volumes:
      - temporal-postgresql-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U temporal"]
      interval: 5s
      timeout: 5s
      retries: 60
      start_period: 30s

  temporal-schema:
    image: temporalio/admin-tools:1.31.0
    container_name: meiao-temporal-schema
    depends_on:
      postgresql:
        condition: service_healthy
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_USER: temporal
      POSTGRES_PWD: temporal
      POSTGRES_SEEDS: postgresql
      SQL_PASSWORD: temporal
    networks:
      - temporal-network
    volumes:
      - ./scripts:/scripts:ro
    entrypoint: ["/bin/sh"]
    command: ["/scripts/setup-postgres.sh"]
    restart: "no"

  temporal:
    image: temporalio/server:1.31.0
    container_name: meiao-temporal
    restart: unless-stopped
    depends_on:
      temporal-schema:
        condition: service_completed_successfully
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_USER: temporal
      POSTGRES_PWD: temporal
      POSTGRES_SEEDS: postgresql
      BIND_ON_IP: 0.0.0.0
      DYNAMIC_CONFIG_FILE_PATH: config/dynamicconfig/development-sql.yaml
    networks:
      - temporal-network
    ports:
      - "127.0.0.1:7233:7233"
    volumes:
      - ./dynamicconfig:/etc/temporal/config/dynamicconfig:ro
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "7233"]
      interval: 5s
      timeout: 3s
      retries: 60
      start_period: 30s

  temporal-create-namespace:
    image: temporalio/admin-tools:1.31.0
    container_name: meiao-temporal-create-namespace
    depends_on:
      temporal:
        condition: service_healthy
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      DEFAULT_NAMESPACE: default
    networks:
      - temporal-network
    volumes:
      - ./scripts:/scripts:ro
    entrypoint: ["/bin/sh"]
    command: ["/scripts/create-namespace.sh"]
    restart: on-failure:5

  temporal-ui:
    image: temporalio/ui:2.49.1
    container_name: meiao-temporal-ui
    restart: unless-stopped
    depends_on:
      temporal:
        condition: service_healthy
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CORS_ORIGINS: http://111.229.66.247,http://111.229.66.247:3100
    networks:
      - temporal-network
    ports:
      - "127.0.0.1:8233:8080"

networks:
  temporal-network:
    driver: bridge

volumes:
  temporal-postgresql-data:
